# Synthetic Vision Dataset Konfigürasyonu
# YOLOv8 formatı - bu dosya model eğitiminde --data argümanı olarak kullanılır

path: ./dataset  # dataset kök klasörü

train: images/train
val:   images/val
test:  images/test

# Sınıf sayısı
nc: 3

# Sınıf isimleri (ID sırası değiştirilemez!)
names:
  0: tabela   # Parkur aşama tabelası (daire, 60cm, siyah zemin beyaz metin)
  1: stop     # Dik eğim üzerindeki STOP yazısı/işareti
  2: hedef    # Atış hedefi (A3, en az 10m uzakta, çerçeveli)

# NOT: engel ve koni sınıfları kapsam dışı bırakıldı.
# Bu nesneler ilerleyen aşamada LiDAR ile ele alınacak.
